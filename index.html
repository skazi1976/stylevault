<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | StyleVault</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
        }
        
        .navbar {
            background-color: #16213e;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 10px rgba(233, 69, 96, 0.2);
        }
        
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .nav-logo {
            font-size: 1.8rem;
            font-weight: bold;
            text-decoration: none;
            color: #e94560;
        }
        
        .nav-logo span {
            color: white;
        }
        
        .nav-links {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }
        
        .nav-links a {
            color: #e0e0e0;
            text-decoration: none;
            transition: color 0.3s;
            font-size: 0.95rem;
        }
        
        .nav-links a:hover {
            color: #e94560;
        }
        
        .hero {
            background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
            padding: 4rem 2rem;
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .hero h1 {
            font-size: 3rem;
            color: #e94560;
            margin-bottom: 0.5rem;
        }
        
        .hero p {
            font-size: 1.2rem;
            color: #b0b0b0;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }
        
        .product-card {
            background-color: #16213e;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(233, 69, 96, 0.3);
        }
        
        .product-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background-color: #0a0a0a;
        }
        
        .product-info {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        
        .product-title {
            font-size: 0.95rem;
            color: #e0e0e0;
            margin-bottom: 1rem;
            line-height: 1.4;
            flex-grow: 1;
        }
        
        .product-price {
            font-size: 1.5rem;
            color: #e94560;
            font-weight: bold;
            margin-bottom: 1rem;
        }
        
        .btn-shop {
            background-color: #e94560;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            transition: background-color 0.3s;
            text-decoration: none;
            text-align: center;
            display: inline-block;
        }
        
        .btn-shop:hover {
            background-color: #d73450;
        }
        
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }
        
        .category-card {
            background-color: #16213e;
            border-radius: 8px;
            overflow: hidden;
            height: 300px;
            position: relative;
            transition: transform 0.3s;
            cursor: pointer;
        }
        
        .category-card:hover {
            transform: scale(1.02);
        }
        
        .category-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
        }
        
        .category-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 10, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .category-name {
            font-size: 2rem;
            font-weight: bold;
            color: #e94560;
            text-align: center;
        }
        
        .category-card a {
            text-decoration: none;
            display: 100%;
        }
        
        footer {
            background-color: #16213e;
            padding: 2rem;
            text-align: center;
            margin-top: 4rem;
            border-top: 1px solid #e94560;
        }
        
        footer p {
            font-size: 0.9rem;
            color: #b0b0b0;
        }
        
        .affiliate-disclosure {
            background-color: #0f3460;
            padding: 1.5rem;
            border-left: 4px solid #e94560;
            margin-bottom: 2rem;
            border-radius: 4px;
        }
        
        .affiliate-disclosure p {
            font-size: 0.85rem;
            color: #d0d0d0;
        }
        
        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }
            
            .hero h1 {
                font-size: 2rem;
            }
            
            .nav-links {
                gap: 1rem;
                font-size: 0.85rem;
            }
        }
        
        @media (max-width: 480px) {
            .products-grid {
                grid-template-columns: 1fr;
            }
            
            .hero {
                padding: 2rem 1rem;
            }
            
            .hero h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
